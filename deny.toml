[advisories]
yanked = "deny"
ignore = []

[licenses]
unused-allowed-license = "allow"

# Keep runtime dependencies compatible with publishing this crate as
# MIT OR Apache-2.0. Dev-dependencies are not inherited by downstream users.
include-dev = false

allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "BSL-1.0",
    "ISC",
    "MIT",
    "Unicode-3.0",
    "Zlib",
]

[bans]
multiple-versions = "warn"
wildcards = "deny"
highlight = "all"
